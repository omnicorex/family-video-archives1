<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist — Family Archives</title>

  <!-- Primary Meta -->
  <meta name="description" content="Family video playlist.">
  <meta name="theme-color" content="#C8001A">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="Playlist — Family Archives">
  <meta property="og:description" content="Family video playlist.">
  <meta property="og:image"       content="branding/og-image.png">
  <meta property="og:url"         content="">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Playlist — Family Archives">
  <meta name="twitter:image"       content="branding/og-image.png">

  <!-- Favicon -->
  <link rel="icon"             type="image/svg+xml" href="branding/favicon.svg">
  <link rel="icon"             type="image/png"     href="branding/favicon.png" sizes="32x32">
  <link rel="apple-touch-icon"                      href="branding/apple-touch-icon.png">
  <link rel="manifest"                              href="branding/site.webmanifest">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="playlist">

  <!-- ── Navigation ─────────────────────────────────────────── -->
  <nav class="nav" aria-label="Main navigation">
    <div class="nav-inner">
      <a class="nav-logo" href="index.html" aria-label="Home">
        <img src="branding/logo.svg" alt="" aria-hidden="true" width="34" height="34">
        <span id="nav-site-name">Family Archives</span>
      </a>
      <ul class="nav-links" role="list">
        <li><a class="nav-link nav-link--internal" href="index.html#playlists">All Playlists</a></li>
      </ul>
    </div>
  </nav>

  <!-- ── Playlist Header ────────────────────────────────────── -->
  <header class="playlist-hero">
    <a class="back-link" href="index.html">
      <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      All Playlists
    </a>

    <div class="playlist-hero-eyebrow" aria-hidden="true">Playlist</div>
    <h1 class="playlist-hero-title" id="playlist-title">Loading…</h1>
    <p  class="playlist-hero-desc"  id="playlist-desc"></p>
    <div class="playlist-hero-meta" id="playlist-meta" aria-live="polite"></div>
  </header>

  <!-- ── Player + Video List ────────────────────────────────── -->
  <div class="player-section" id="player-section">
    <div class="player-layout">

      <!-- Main player (sticky on desktop) -->
      <div class="player-main">
        <div class="player-embed-wrap" id="player-embed" aria-label="Video player">
          <video id="video-player" controls playsinline preload="metadata">
            <!-- src set by JS -->
          </video>
        </div>
        <div class="player-info">
          <h2 class="player-title" id="player-title"></h2>
          <p  class="player-desc"  id="player-desc"></p>
        </div>
      </div>

      <!-- Scrollable video list sidebar -->
      <div class="video-sidebar">
        <div class="video-sidebar-header">
          Up next
        </div>
        <div class="video-list" id="video-list" role="list" aria-label="Videos in this playlist">
          <!-- Populated by JS -->
        </div>
      </div>

    </div>
  </div>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <footer>
    <div class="footer-tricolor" aria-hidden="true">
      <div class="ftc-red"></div>
      <div class="ftc-blue"></div>
      <div class="ftc-orange"></div>
    </div>

    <div class="footer-main">
      <div class="footer-logo-wrap">
        <div class="footer-logo-bezel">
          <div class="footer-logo-shell">
            <img class="footer-logo-img" src="branding/logo.svg"
                 alt="Family Video Archives logo" width="140" height="140">
          </div>
        </div>
        <span class="footer-brand-name" id="footer-name">Family Archives</span>
        <p class="footer-tagline">Preserving our stories,<br>one frame at a time.</p>
      </div>

      <div class="footer-aside">
        <nav class="footer-links" aria-label="Footer navigation">
          <a class="footer-link footer-link--internal" href="index.html#playlists">All Playlists</a>
          <a class="footer-link footer-link--external" href="https://tube.tbg2.cloud"
             target="_blank" rel="noopener noreferrer">Source ↗</a>
        </nav>
        <div class="footer-credit">
          <span>Crafted with</span>
          <span class="footer-heart" aria-hidden="true">♥</span>
          <span>by</span>
          <a class="footer-omnicorex" href="https://omnicorex.com"
             target="_blank" rel="noopener noreferrer">Omnicorex</a>
        </div>
      </div>
    </div>

    <div class="footer-bottom">
      <span class="footer-copy">&copy; <span id="footer-year"></span> · All rights reserved.</span>
      <div class="footer-sprockets" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
    </div>
  </footer>

  <!-- HLS.js for adaptive streaming in non-Safari browsers -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
